<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#fff7e6">
  <title>우리 동네 배려왕</title>
  <style>
    :root {
      --bg: #fff7e6;
      --panel: #ffffff;
      --ink: #202124;
      --good: #178a4a;
      --good-light: #dff7e9;
      --bad: #c43b3b;
      --bad-light: #ffe4e4;
      --accent: #ffb000;
      --blue: #1976d2;
      --shadow: 0 10px 28px rgba(0,0,0,.12);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                   "Noto Sans KR", Arial, sans-serif;
      overscroll-behavior: none;
    }

    body {
      min-height: 100dvh;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      user-select: none;
      -webkit-user-select: none;
    }

    button {
      font: inherit;
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:focus-visible {
      outline: 5px solid #000;
      outline-offset: 4px;
    }

    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding:
        max(14px, env(safe-area-inset-top))
        max(14px, env(safe-area-inset-right))
        max(14px, env(safe-area-inset-bottom))
        max(14px, env(safe-area-inset-left));
      gap: 14px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .topbar {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--panel);
      border-radius: 24px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .app-icon {
      font-size: clamp(34px, 5vw, 52px);
      line-height: 1;
    }

    .title {
      margin: 0;
      font-size: clamp(22px, 3.5vw, 36px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .round-btn {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: #eef5ff;
      font-size: 30px;
      display: grid;
      place-items: center;
    }

    .round-btn:active,
    .choice-btn:active,
    .primary-btn:active,
    .mode-btn:active {
      transform: scale(.97);
    }

    .progress-panel {
      background: var(--panel);
      border-radius: 22px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-track {
      flex: 1;
      height: 24px;
      background: #ececec;
      border-radius: 999px;
      overflow: hidden;
      border: 3px solid #fff;
      box-shadow: inset 0 0 0 2px #d7d7d7;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ffca28, #ff8f00);
      border-radius: inherit;
      transition: width .3s ease;
    }

    .score-stars {
      min-width: 95px;
      text-align: right;
      font-weight: 800;
      font-size: clamp(20px, 3vw, 30px);
    }

    .screen {
      display: none;
      flex: 1;
      min-height: 0;
    }

    .screen.active {
      display: flex;
    }

    #homeScreen {
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .hero {
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(20px, 5vw, 48px);
      text-align: center;
    }

    .hero-emoji {
      font-size: clamp(86px, 18vw, 170px);
      line-height: 1;
      margin-bottom: 12px;
    }

    .hero h2 {
      margin: 0 0 8px;
      font-size: clamp(30px, 5vw, 54px);
    }

    .hero p {
      margin: 0;
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 700;
      color: #4b4b4b;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .mode-btn {
      min-height: 130px;
      border-radius: 28px;
      padding: 16px;
      background: white;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
    }

    .mode-btn .emoji {
      font-size: clamp(54px, 9vw, 90px);
      flex-shrink: 0;
    }

    .mode-btn strong {
      display: block;
      font-size: clamp(23px, 4vw, 38px);
      margin-bottom: 4px;
    }

    .mode-btn span {
      font-size: clamp(16px, 2.5vw, 24px);
      color: #555;
      font-weight: 700;
    }

    #gameScreen {
      flex-direction: column;
      gap: 14px;
    }

    .scene-card {
      flex: 1;
      min-height: 280px;
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: 1fr auto;
      align-items: center;
      justify-items: center;
      padding: clamp(16px, 4vw, 34px);
      overflow: hidden;
      position: relative;
    }

    .scene-emoji {
      font-size: clamp(110px, 24vw, 230px);
      line-height: 1;
      text-align: center;
      filter: drop-shadow(0 8px 6px rgba(0,0,0,.12));
    }

    .scene-text {
      width: 100%;
      text-align: center;
      font-size: clamp(25px, 4vw, 44px);
      font-weight: 900;
      line-height: 1.25;
      padding: 12px 8px 2px;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .choice-btn {
      min-height: 138px;
      border-radius: 28px;
      box-shadow: var(--shadow);
      color: #111;
      padding: 16px;
      font-size: clamp(22px, 4vw, 40px);
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .choice-btn .big {
      font-size: clamp(50px, 8vw, 82px);
      line-height: 1;
    }

    .good-btn {
      background: var(--good-light);
      border: 5px solid var(--good);
    }

    .bad-btn {
      background: var(--bad-light);
      border: 5px solid var(--bad);
    }

    .feedback {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 30;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .feedback.show {
      display: flex;
      animation: fadeIn .15s ease;
    }

    .feedback-box {
      width: min(760px, 95vw);
      background: white;
      border-radius: 36px;
      padding: clamp(24px, 6vw, 56px);
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,.23);
    }

    .feedback-icon {
      font-size: clamp(100px, 24vw, 220px);
      line-height: 1;
    }

    .feedback-message {
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 1000;
      margin: 14px 0 22px;
    }

    .primary-btn {
      min-height: 74px;
      min-width: 220px;
      border-radius: 24px;
      background: var(--blue);
      color: white;
      font-weight: 900;
      font-size: clamp(24px, 4vw, 38px);
      padding: 12px 28px;
    }

    #finishScreen {
      align-items: center;
      justify-content: center;
    }

    .finish-card {
      width: 100%;
      background: white;
      border-radius: 34px;
      box-shadow: var(--shadow);
      text-align: center;
      padding: clamp(24px, 6vw, 58px);
    }

    .finish-emoji {
      font-size: clamp(110px, 24vw, 220px);
      line-height: 1;
    }

    .finish-card h2 {
      font-size: clamp(34px, 6vw, 64px);
      margin: 16px 0 8px;
    }

    .finish-card p {
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 800;
      margin: 0 0 22px;
    }

    .hidden {
      display: none !important;
    }

    .pulse {
      animation: pulse .65s ease;
    }

    .shake {
      animation: shake .4s ease;
    }

    .confetti {
      position: fixed;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      z-index: 50;
      pointer-events: none;
      animation: fall 1.1s linear forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      45% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-12px); }
      75% { transform: translateX(12px); }
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
    }

    @media (max-width: 700px) {
      .app {
        gap: 10px;
        padding:
          max(10px, env(safe-area-inset-top))
          max(10px, env(safe-area-inset-right))
          max(10px, env(safe-area-inset-bottom))
          max(10px, env(safe-area-inset-left));
      }

      .topbar {
        min-height: 58px;
        padding: 8px 10px;
      }

      .round-btn {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        font-size: 26px;
      }

      .title {
        font-size: 21px;
      }

      .mode-grid {
        grid-template-columns: 1fr;
      }

      .mode-btn {
        min-height: 104px;
      }

      .scene-card {
        min-height: 250px;
      }

      .choice-grid {
        gap: 10px;
      }

      .choice-btn {
        min-height: 120px;
        flex-direction: column;
        gap: 2px;
      }

      .choice-btn .big {
        font-size: 58px;
      }
    }

    @media (orientation: landscape) and (max-height: 650px) {
      .app {
        gap: 8px;
      }

      .topbar {
        min-height: 54px;
      }

      .progress-panel {
        padding: 7px 12px;
      }

      #gameScreen {
        display: none;
      }

      #gameScreen.active {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 10px;
      }

      .scene-card {
        min-height: 0;
        height: calc(100dvh - 145px);
      }

      .scene-emoji {
        font-size: clamp(90px, 22vh, 170px);
      }

      .scene-text {
        font-size: clamp(22px, 4vh, 34px);
      }

      .choice-grid {
        grid-template-columns: 1fr;
        align-content: stretch;
      }

      .choice-btn {
        min-height: 0;
        height: 100%;
        font-size: clamp(22px, 4vh, 34px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-live="polite">
    <header class="topbar">
      <div class="title-wrap">
        <div class="app-icon" aria-hidden="true">🏘️</div>
        <h1 class="title">우리 동네 배려왕</h1>
      </div>
      <div class="top-actions">
        <button id="soundBtn" class="round-btn" type="button" aria-label="음성 안내 켜기 또는 끄기">🔊</button>
        <button id="homeBtn" class="round-btn hidden" type="button" aria-label="처음 화면으로 이동">🏠</button>
      </div>
    </header>

    <section id="progressPanel" class="progress-panel hidden" aria-label="게임 진행 상황">
      <div class="progress-row">
        <div class="progress-track" aria-hidden="true">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div id="scoreStars" class="score-stars">⭐ 0</div>
      </div>
    </section>

    <section id="homeScreen" class="screen active">
      <div class="hero">
        <div class="hero-emoji" aria-hidden="true">🤝💛</div>
        <h2>배려 행동을 찾아요!</h2>
        <p>그림을 보고 큰 버튼을 눌러요.</p>
      </div>

      <div class="mode-grid">
        <button class="mode-btn" type="button" data-mode="practice">
          <span class="emoji" aria-hidden="true">🌱</span>
          <span>
            <strong>천천히 연습</strong>
            <span>같은 그림을 여러 번 연습해요.</span>
          </span>
        </button>

        <button class="mode-btn" type="button" data-mode="challenge">
          <span class="emoji" aria-hidden="true">🏆</span>
          <span>
            <strong>배려왕 도전</strong>
            <span>여러 상황을 차례로 풀어요.</span>
          </span>
        </button>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <article id="sceneCard" class="scene-card">
        <div id="sceneEmoji" class="scene-emoji" aria-hidden="true">🧒🤝👵</div>
        <div id="sceneText" class="scene-text">도와드려요</div>
      </article>

      <div class="choice-grid" role="group" aria-label="정답 선택">
        <button id="goodBtn" class="choice-btn good-btn" type="button" aria-label="배려해요">
          <span class="big" aria-hidden="true">💚</span>
          <span>배려해요</span>
        </button>

        <button id="badBtn" class="choice-btn bad-btn" type="button" aria-label="배려 아니에요">
          <span class="big" aria-hidden="true">⛔</span>
          <span>아니에요</span>
        </button>
      </div>
    </section>

    <section id="finishScreen" class="screen">
      <div class="finish-card">
        <div class="finish-emoji" aria-hidden="true">🏆🌟</div>
        <h2>배려왕 성공!</h2>
        <p id="finishText">별을 많이 모았어요!</p>
        <button id="againBtn" class="primary-btn" type="button">한 번 더</button>
      </div>
    </section>
  </main>

  <div id="feedback" class="feedback" role="dialog" aria-modal="true" aria-labelledby="feedbackMessage">
    <div class="feedback-box">
      <div id="feedbackIcon" class="feedback-icon" aria-hidden="true">⭕</div>
      <div id="feedbackMessage" class="feedback-message">참 잘했어요!</div>
      <button id="nextBtn" class="primary-btn" type="button">다음</button>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var scenarios = [
        { emoji: "🧒🤝👵", text: "무거운 짐을 도와드려요", good: true, speak: "이웃의 무거운 짐을 도와드려요." },
        { emoji: "🏠🔊😣", text: "집에서 아주 크게 소리쳐요", good: false, speak: "집에서 아주 크게 소리쳐요." },
        { emoji: "🧒🍪➡️🧒", text: "간식을 나누어 먹어요", good: true, speak: "친구와 간식을 나누어 먹어요." },
        { emoji: "🚪💥🏃", text: "문을 세게 닫고 뛰어가요", good: false, speak: "문을 세게 닫고 뛰어가요." },
        { emoji: "🗑️➡️♻️", text: "쓰레기를 바르게 버려요", good: true, speak: "쓰레기를 바르게 버려요." },
        { emoji: "🧒🛝👉😢", text: "친구를 밀어요", good: false, speak: "놀이터에서 친구를 밀어요." },
        { emoji: "🛗👵➡️🙂", text: "엘리베이터를 기다려 드려요", good: true, speak: "엘리베이터를 기다려 드려요." },
        { emoji: "🧒📦🚫🧒", text: "허락 없이 물건을 가져가요", good: false, speak: "허락 없이 다른 사람의 물건을 가져가요." },
        { emoji: "🌱💧🙂", text: "함께 쓰는 화분에 물을 줘요", good: true, speak: "함께 쓰는 화분에 물을 줘요." },
        { emoji: "🐕💩🚶", text: "반려동물 배설물을 그냥 두어요", good: false, speak: "반려동물 배설물을 치우지 않고 그냥 두어요." },
        { emoji: "🚌🪑➡️🤰", text: "자리를 양보해요", good: true, speak: "필요한 이웃에게 자리를 양보해요." },
        { emoji: "🌙🔨🔊", text: "밤에 큰 소리로 공사해요", good: false, speak: "밤에 큰 소리로 공사해요." }
      ];

      var state = {
        mode: "challenge",
        order: [],
        index: 0,
        score: 0,
        locked: false,
        sound: true
      };

      var homeScreen = document.getElementById("homeScreen");
      var gameScreen = document.getElementById("gameScreen");
      var finishScreen = document.getElementById("finishScreen");
      var progressPanel = document.getElementById("progressPanel");
      var progressFill = document.getElementById("progressFill");
      var scoreStars = document.getElementById("scoreStars");
      var sceneCard = document.getElementById("sceneCard");
      var sceneEmoji = document.getElementById("sceneEmoji");
      var sceneText = document.getElementById("sceneText");
      var goodBtn = document.getElementById("goodBtn");
      var badBtn = document.getElementById("badBtn");
      var feedback = document.getElementById("feedback");
      var feedbackIcon = document.getElementById("feedbackIcon");
      var feedbackMessage = document.getElementById("feedbackMessage");
      var nextBtn = document.getElementById("nextBtn");
      var soundBtn = document.getElementById("soundBtn");
      var homeBtn = document.getElementById("homeBtn");
      var againBtn = document.getElementById("againBtn");
      var finishText = document.getElementById("finishText");
      var modeButtons = document.querySelectorAll(".mode-btn");

      function safeVibrate(pattern) {
        try {
          if (navigator.vibrate) navigator.vibrate(pattern);
        } catch (e) {}
      }

      function speak(text) {
        if (!state.sound || !("speechSynthesis" in window)) return;
        try {
          window.speechSynthesis.cancel();
          var utter = new SpeechSynthesisUtterance(text);
          utter.lang = "ko-KR";
          utter.rate = 0.82;
          utter.pitch = 1.05;
          window.speechSynthesis.speak(utter);
        } catch (e) {}
      }

      function showScreen(name) {
        homeScreen.classList.toggle("active", name === "home");
        gameScreen.classList.toggle("active", name === "game");
        finishScreen.classList.toggle("active", name === "finish");
        progressPanel.classList.toggle("hidden", name !== "game");
        homeBtn.classList.toggle("hidden", name === "home");
      }

      function shuffledIndices() {
        var arr = scenarios.map(function (_, i) { return i; });
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var temp = arr[i];
          arr[i] = arr[j];
          arr[j] = temp;
        }
        return arr;
      }

      function startGame(mode) {
        state.mode = mode;
        state.index = 0;
        state.score = 0;
        state.locked = false;
        state.order = shuffledIndices();

        if (mode === "practice") {
          state.order = state.order.slice(0, 6);
        } else {
          state.order = state.order.slice(0, 10);
        }

        showScreen("game");
        renderScenario();
      }

      function currentScenario() {
        return scenarios[state.order[state.index]];
      }

      function renderScenario() {
        var item = currentScenario();
        state.locked = false;
        sceneEmoji.textContent = item.emoji;
        sceneText.textContent = item.text;
        sceneCard.classList.remove("pulse", "shake");
        updateProgress();
        window.setTimeout(function () {
          speak(item.speak + " 배려하는 행동일까요?");
        }, 180);
      }

      function updateProgress() {
        var total = state.order.length;
        var current = Math.min(state.index, total);
        var percent = (current / total) * 100;
        progressFill.style.width = percent + "%";
        scoreStars.textContent = "⭐ " + state.score;
      }

      function answer(choiceGood) {
        if (state.locked) return;
        state.locked = true;

        var correct = currentScenario().good === choiceGood;
        if (correct) {
          state.score += 1;
          feedbackIcon.textContent = "⭕";
          feedbackMessage.textContent = "참 잘했어요!";
          sceneCard.classList.add("pulse");
          safeVibrate(80);
          speak("참 잘했어요. 배려하는 행동이에요.");
          makeConfetti();
        } else {
          feedbackIcon.textContent = "💡";
          feedbackMessage.textContent = "다시 생각해요";
          sceneCard.classList.add("shake");
          safeVibrate([80, 60, 80]);
          speak(currentScenario().good ? "이 행동은 배려하는 행동이에요." : "이 행동은 배려하는 행동이 아니에요.");
        }

        scoreStars.textContent = "⭐ " + state.score;
        nextBtn.textContent = state.index >= state.order.length - 1 ? "결과 보기" : "다음";
        feedback.classList.add("show");
      }

      function nextScenario() {
        feedback.classList.remove("show");
        state.index += 1;

        if (state.index >= state.order.length) {
          finishGame();
        } else {
          renderScenario();
        }
      }

      function finishGame() {
        showScreen("finish");
        progressFill.style.width = "100%";
        var total = state.order.length;
        var ratio = state.score / total;
        if (ratio >= 0.8) {
          finishText.textContent = "별 " + state.score + "개! 정말 멋져요!";
          speak("배려왕 성공. 정말 멋져요.");
          makeConfetti(36);
        } else if (ratio >= 0.5) {
          finishText.textContent = "별 " + state.score + "개! 조금 더 연습해요!";
          speak("잘했어요. 조금 더 연습해요.");
        } else {
          finishText.textContent = "천천히 다시 해보아요!";
          speak("괜찮아요. 천천히 다시 해보아요.");
        }
      }

      function goHome() {
        try {
          if ("speechSynthesis" in window) window.speechSynthesis.cancel();
        } catch (e) {}
        feedback.classList.remove("show");
        showScreen("home");
      }

      function toggleSound() {
        state.sound = !state.sound;
        soundBtn.textContent = state.sound ? "🔊" : "🔇";
        soundBtn.setAttribute("aria-label", state.sound ? "음성 안내 끄기" : "음성 안내 켜기");
        if (state.sound) {
          speak("음성 안내를 켰어요.");
        } else {
          try {
            if ("speechSynthesis" in window) window.speechSynthesis.cancel();
          } catch (e) {}
        }
      }

      function makeConfetti(count) {
        var total = typeof count === "number" ? count : 18;
        var colors = ["#ffca28", "#ff7043", "#66bb6a", "#42a5f5", "#ab47bc"];
        for (var i = 0; i < total; i++) {
          var piece = document.createElement("div");
          piece.className = "confetti";
          piece.style.left = Math.random() * 100 + "vw";
          piece.style.top = "-20px";
          piece.style.background = colors[i % colors.length];
          piece.style.animationDelay = (Math.random() * 0.25) + "s";
          piece.style.animationDuration = (0.9 + Math.random() * 0.7) + "s";
          document.body.appendChild(piece);
          window.setTimeout((function (el) {
            return function () {
              if (el && el.parentNode) el.parentNode.removeChild(el);
            };
          })(piece), 1900);
        }
      }

      function bindPress(element, handler) {
        element.addEventListener("click", function (event) {
          event.preventDefault();
          handler();
        }, { passive: false });
      }

      for (var i = 0; i < modeButtons.length; i++) {
        (function (button) {
          bindPress(button, function () {
            startGame(button.getAttribute("data-mode"));
          });
        })(modeButtons[i]);
      }

      bindPress(goodBtn, function () { answer(true); });
      bindPress(badBtn, function () { answer(false); });
      bindPress(nextBtn, nextScenario);
      bindPress(homeBtn, goHome);
      bindPress(soundBtn, toggleSound);
      bindPress(againBtn, function () { startGame(state.mode); });

      document.addEventListener("touchmove", function (event) {
        if (event.scale && event.scale !== 1) event.preventDefault();
      }, { passive: false });

      document.addEventListener("gesturestart", function (event) {
        event.preventDefault();
      }, { passive: false });

      window.addEventListener("pageshow", function () {
        state.locked = false;
        feedback.classList.remove("show");
      });

      window.addEventListener("error", function () {
        state.locked = false;
      });

      if (!("speechSynthesis" in window)) {
        state.sound = false;
        soundBtn.textContent = "🔇";
        soundBtn.setAttribute("aria-label", "이 기기에서는 음성 안내를 사용할 수 없어요");
      }
    })();
  </script>
</body>
</html>
